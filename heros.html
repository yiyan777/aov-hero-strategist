<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>英雄列表</title>
    <link rel="stylesheet" href="./style/css/heros.css" />
  </head>
  <body>
    <header class="toolbar">
      <h1 id="title">所有英雄</h1>
      <nav>
        <a href="./index.html">回首頁</a>
      </nav>
    </header>

    <section class="filter-container">
      <div class="main-filters">
        <button id="showAllHeros">所有英雄</button>
        <button id="lifeOver3000">血量大於 3000</button>
      </div>

      <div id="occupation-filter" class="tag-filters">
        <button data-type="法師">法師</button>
        <button data-type="射手">射手</button>
        <button data-type="輔助">輔助</button>
        <button data-type="坦克">坦克</button>
        <button data-type="刺客">刺客</button>
        <button data-type="戰士">戰士</button>
      </div>
    </section>

    <div id="heros" class="heros"></div>

    <script type="module" src="./js/pages/heros/heroController.js"></script>
  </body>
</html>
